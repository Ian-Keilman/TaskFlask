<!doctype html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>{% block title %}TaskFlask{% endblock %}</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    <script src="{{ url_for('static', filename='app.js') }}" defer></script>
</head>
<body>
    <header class="site-header">
        <nav class="nav">
            <a class="brand" href="{{ url_for('main.index') }}">TaskFlask</a>
            <div class="nav-links">
                <a href="{{ url_for('main.index') }}">Dashboard</a>
                <a href="{{ url_for('main.projects') }}">Projects</a>
            </div>
            <a class="button nav-action" href="{{ url_for('main.new_project') }}">New Project</a>
        </nav>
    </header>

    <main class="container">
        {% with messages = get_flashed_messages() %}
            {% if messages %}
                <div class="flash-list" role="status" aria-live="polite">
                    {% for message in messages %}
                        <p class="flash">{{ message }}</p>
                    {% endfor %}
                </div>
            {% endif %}
        {% endwith %}

        {% block content %}{% endblock %}
    </main>
</body>
</html>
