<!doctype html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>{% block title %}TaskFlask{% endblock %}</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    <script src="{{ url_for('static', filename='app.js') }}" defer></script>
</head>
<body>
    <header class="site-header">
        <nav class="nav">
            <a class="brand" href="{{ url_for('main.index') }}">
                <span class="brand-icon">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M9 2h6" />
                        <path d="M10 2v6l-5.5 9.5A3 3 0 0 0 7.1 22h9.8a3 3 0 0 0 2.6-4.5L14 8V2" />
                        <path d="M8 15h8" />
                        <path d="M9.5 18h5" />
                    </svg>
                </span>
                <span>TaskFlask</span>
            </a>

            <div class="nav-links">
                <a class="{% if request.endpoint == 'main.index' %}active{% endif %}" href="{{ url_for('main.index') }}">
                    Dashboard
                </a>
                <a class="{% if request.endpoint == 'main.projects' %}active{% endif %}" href="{{ url_for('main.projects') }}">
                    Projects
                </a>
            </div>
        </nav>
    </header>

    <main class="container">
        {% with messages = get_flashed_messages() %}
            {% if messages %}
                <div class="flash-list" role="status" aria-live="polite">
                    {% for message in messages %}
                        <p class="flash">{{ message }}</p>
                    {% endfor %}
                </div>
            {% endif %}
        {% endwith %}

        {% block content %}{% endblock %}
    </main>
</body>
</html>
